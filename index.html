<!DOCTYPE html>
<html lang="en">
<head>
    <title>html 2</title>
</head>
<body>
   <h1>HTML from </h1> 
   <form action="./controller.html">
<label aria-required="" for="name">Name:(*)</label>
<input type="text" id="name" name="name" placeholder="enter your name.."><br><br>
<label for="email">Email:</label>   
<input type="email" id="email" name="email" placeholder="enter your email.."><br><br>
<label for="phone">Phone:</label>
<input type="tel" id="phone" name="phone" placeholder="enter your phone number.."><br><br>
<label for="password">Password:</label>
<input type="password" id="password" name="password" placeholder="enter your password.."><br><br>
<label for="gender">Gender:</label>
<select id="gender" name="gender">
    <option value="" disabled selected>----select your gender----</option>  
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
</select><br><br>
<label for="dob">Date of Birth:</label>
<input type="date" id="dob" name="dob" placeholder="select your date of birth.."><br><br> 
<label for="color">Favorite Color:</label>
   <input type="color" id="color" name="color"><br><br>
<label for="blood group">Blood Group:   </label>
   <input type="text" id="blood group" name="blood group" placeholder="enter your blood group.."><br><br>
<label for="search">Search:</label>
   <input type="text" id="search" name="search" placeholder="search.."><br><br>
<label for="comment">Comment:</label><br>
<textarea id="comment" name="comment" rows="4" cols="50" placeholder="enter your comment.."></textarea><br><br>
<label for="file">
    <img src="./01.jpg" alt="file upload" width="100px" height="80px"> Upload image :</label>
    <input hidden="file" id="file" name="file"><br><br>
<label for="select division">Select Division:</label>
        

<select id="select division" name="select division">
    <option value="" disabled selected>----select a division----</option>
    <option value="dhaka">Dhaka</option>
    <option value="chittagong">Chittagong</option>
    <option value="khulna">Khulna</option>
    <option value="barisal">Barisal</option>
    <option value="sylhet">Sylhet</option>
    <option value="rangpur">Rangpur</option>
    <option value="mymensingh">Mymensingh</option>
    <option value="rajshahi">Rajshahi</option>
</select><br><br>
<label for="submit"></label>
<input type="submit" id="submit" name="submit" value="Submit">  

   </form>
</body>
</html>
